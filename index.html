<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GRÜN · Arbeits‑Tüchtigkeit · 360°‑Realität</title>

<style>
  body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
  h1, h2 { color:#6cf; }
  .block { background:#111; border:1px solid #333; padding:15px; margin:20px 0; }
  pre { background:#000; border:1px solid #333; padding:12px; }
  .ok { color:#00ff88; }
  .mid { color:#ffcc00; }
  .bad { color:#ff4444; }
</style>

<script>
// ------------------------------------------------------
// GRÜN – operative Bewertung
// ------------------------------------------------------

const FILES = [
  "BEN.tmp","DA.tmp","NE.tmp",
  "C.tmp","X.tmp","Z.tmp",
  "ORT.scan","scan.language",
  "gone.room","ID.html",
  "index.html","verify.html",
  "README.md"
];

// Gewichtung für Arbeits‑Tüchtigkeit
const WEIGHTS = {
  "BEN.tmp": 15,
  "DA.tmp": 15,
  "NE.tmp": 15,
  "C.tmp": 20,
  "X.tmp": 10,
  "Z.tmp": 10,
  "ORT.scan": 5,
  "scan.language": 5,
  "gone.room": 2,
  "ID.html": 1,
  "index.html": 1,
  "verify.html": 1,
  "README.md": 0
};

// Datei‑Check
async function checkFile(name){
  try{
    const res = await fetch("./" + name);
    if(!res.ok) return { name, ok:false };
    const txt = await res.text();
    return { name, ok:true, content:txt };
  }catch(e){
    return { name, ok:false };
  }
}

// Score berechnen
function calcScore(results){
  let score = 0;
  results.forEach(r => {
    if(r.ok) score += WEIGHTS[r.name];
  });
  return score;
}

// 360°‑Matrix erzeugen
function matrix(results){
  return {
    A: results.filter(r => ["BEN.tmp","DA.tmp","NE.tmp"].includes(r.name)),
    B: results.filter(r => ["C.tmp","X.tmp","Z.tmp"].includes(r.name)),
    SYS: results.filter(r => ["ORT.scan","scan.language","gone.room"].includes(r.name)),
    META: results.filter(r => ["ID.html","index.html","verify.html","README.md"].includes(r.name))
  };
}

// Start
async function start(){
  const results = [];
  for(const f of FILES){
    results.push(await checkFile(f));
  }

  const score = calcScore(results);
  const m = matrix(results);

  document.getElementById("score").textContent = score + "%";
  document.getElementById("matrix").textContent = JSON.stringify(m, null, 2);

  const out = document.getElementById("files");
  results.forEach(r => {
    const div = document.createElement("div");
    div.className = "block";
    div.innerHTML = `
      <h2 class="${r.ok ? 'ok' : 'bad'}">${r.name}</h2>
      <pre>${r.ok ? "OK" : "FEHLT"}</pre>
    `;
    out.appendChild(div);
  });
}
</script>
</head>

<body onload="start()">

<h1>GRÜN · Arbeits‑Tüchtigkeit · 360°‑Realität</h1>

<div class="block">
  <h2>Arbeits‑Tüchtigkeits‑Score</h2>
  <pre id="score">…</pre>
</div>

<div class="block">
  <h2>360°‑Matrix</h2>
  <pre id="matrix">…</pre>
</div>

<div id="files"></div>

</body>
</html>
